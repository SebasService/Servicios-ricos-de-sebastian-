<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastián Chuparico - Servicios</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            width: 90%;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2rem;
            color: #ff3333;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 25px;
        }

        .promo-img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.3);
            margin-bottom: 25px;
        }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-whatsapp:hover {
            background-color: #20ba5a;
            transform: scale(1.03);
        }

        .btn-whatsapp active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sebastián Chuparico</h1>
        <p>Servicios Orales Exclusivos</p>
        
        <!-- Imagen solicitada -->
        <a href="https://wa.me/573204607855?text=Hola%20Sebastián,%20quiero%20solicitar%20tus%20servicios%20orales." target="_blank">
            <img src="chupon.jpg" alt="Sebastián Chuparico" class="promo-img">
        </a>

        <!-- Botón de contacto -->
        <a href="https://wa.me/573204607855?text=Hola%20Sebastián,%20quiero%20solicitar%20tus%20servicios%20orales." target="_blank" class="btn-whatsapp">
            Contratar por WhatsApp
        </a>
    </div>

</body>
</html>
